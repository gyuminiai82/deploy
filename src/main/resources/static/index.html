<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth2 API Test</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 40px; background-color: #f8f9fa;}
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { padding: 10px 20px; font-size: 16px; margin-right: 10px; cursor: pointer; background-color: #0d6efd; color: white; border: none; border-radius: 5px; transition: background-color 0.2s;}
        button:hover { background-color: #0b5ed7; }
        pre { background: #2b2b2b; color: #a9b7c6; padding: 15px; border-radius: 5px; min-height: 20px; overflow-x: auto; font-family: monospace;}
        h1 { color: #333; }
        .success { color: #20c997; }
        .error { color: #dc3545; }
    </style>
</head>
<body>
    <div class="container">
        <h1>OAuth 2.0 API 테스트</h1>
        <p>아래 버튼을 순서대로 클릭하여 토큰 발급 및 API 호출 과정을 테스트해 보세요.</p>
        
        <div style="margin: 20px 0;">
            <button onclick="getToken()">1. Access Token 발급</button>
            <button onclick="callApi()">2. 보호된 API 호출</button>
        </div>

        <h3>발급된 Access Token:</h3>
        <pre id="tokenDisplay">아직 발급되지 않았습니다...</pre>

        <h3>API 응답 결과:</h3>
        <pre id="apiResponse">응답 대기 중...</pre>
    </div>

    <script>
        let accessToken = null;

        async function getToken() {
            const tokenDisplay = document.getElementById('tokenDisplay');
            tokenDisplay.innerText = "발급 요청 중...";
            tokenDisplay.className = "";

            try {
                // 클라이언트 자격 증명 (my-client : my-secret)
                const credentials = btoa('my-client:my-secret');
                
                // Spring Authorization Server의 기본 Token 엔드포인트
                const response = await fetch('/oauth2/token', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Basic ${credentials}`,
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    // S2S 통신을 위한 client_credentials 그랜트 타입 사용
                    body: 'grant_type=client_credentials&scope=read'
                });

                if (!response.ok) {
                    throw new Error(`HTTP 상태 코드 에러: ${response.status}`);
                }

                const data = await response.json();
                accessToken = data.access_token;
                tokenDisplay.innerText = accessToken;
                tokenDisplay.className = "success";
            } catch (error) {
                tokenDisplay.innerText = "에러 발생: " + error.message;
                tokenDisplay.className = "error";
            }
        }

        async function callApi() {
            const apiResponse = document.getElementById('apiResponse');
            apiResponse.innerText = "API 호출 중...";
            apiResponse.className = "";

            if (!accessToken) {
                apiResponse.innerText = "에러: 먼저 Access Token을 발급받아 주세요!";
                apiResponse.className = "error";
                return;
            }

            try {
                // 발급받은 토큰을 사용해 API 호출 (HomeController)
                const response = await fetch('/api/hello', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP 상태 코드 에러: ${response.status}`);
                }

                const data = await response.text();
                apiResponse.innerText = data;
                apiResponse.className = "success";
            } catch (error) {
                apiResponse.innerText = "에러 발생: " + error.message;
                apiResponse.className = "error";
            }
        }
    </script>
</body>
</html>
